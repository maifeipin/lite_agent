<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lite Agent 控制台 | Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=5">
    <!-- 引入 marked 用于 markdown 渲染 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <!-- 毛玻璃背景装饰球 -->
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <div class="app-container">
        <!-- 侧边导航 / 过滤器 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <span class="logo-icon">📡</span>
                <h2>Lite Agent</h2>
            </div>
            
            <nav class="nav-filters">
                <div class="nav-section">
                    <h3>数据源</h3>
                    <button class="filter-btn active" data-source="all">
                        <span class="icon">🌐</span> 全部 <span class="badge" id="badge-all">0</span>
                    </button>
                    <button class="filter-btn" data-source="emails">
                        <span class="icon">📧</span> 邮件 <span class="badge" id="badge-emails">0</span>
                    </button>
                    <button class="filter-btn" data-source="rss">
                        <span class="icon">📰</span> RSS 新闻 <span class="badge" id="badge-rss">0</span>
                    </button>
                    <button class="filter-btn" data-source="todos">
                        <span class="icon">✅</span> 待办事项 <span class="badge" id="badge-todos">0</span>
                    </button>
                    <button class="filter-btn" data-source="sessions">
                        <span class="icon">💬</span> 会话记录 <span class="badge" id="badge-sessions">0</span>
                    </button>
                </div>

                <div class="nav-section" id="section-categories" style="display:none;">
                    <h3>智能分类</h3>
                    <!-- 动态分类复选框 -->
                </div>
            </nav>

            <div class="sidebar-footer">
                <div class="status-indicator online"></div>
                <span>Agent 连接正常</span>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 顶栏检索框 + Facet -->
            <header class="top-header">
                <div class="search-wrapper">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="search-input" placeholder="输入关键词搜索，或输入 / 唤起指令台..." autocomplete="off">
                    <span class="search-shortcut">/</span>
                </div>
            </header>
            <div id="facet-panel" style="display:none;"></div>

            <!-- 结果画布 -->
            <section class="results-canvas">
                <div class="results-header">
                    <span id="results-count">正在加载索引数据...</span>
                </div>
                
                <!-- 卡片网格 -->
                <div class="results-grid" id="results-grid">
                    <!-- 动态卡片 -->
                    <div class="loading-placeholder">
                        <div class="spinner"></div>
                        <p>正在检索 Meilisearch 索引...</p>
                    </div>
                </div>

                <!-- 无限滚动哨兵元素 -->
                <div id="scroll-sentinel" class="scroll-sentinel" style="display: none; padding: 20px; text-align: center; color: #a1a1aa; font-size: 0.9rem;">
                    <div class="spinner" style="width: 20px; height: 20px; border-width: 2px; margin: 0 auto 10px;"></div>
                    <span>加载更多内容...</span>
                </div>
            </section>
        </main>
    </div>

    <!-- 命令面板 (Command Palette Modal) -->
    <div class="modal-overlay" id="command-modal">
        <div class="modal-content command-palette">
            <div class="command-header">
                <span class="prefix">></span>
                <input type="text" id="command-input" placeholder="输入 Agent 指令 (如: /mail_reprocess)..." autocomplete="off">
            </div>
            <div class="command-list" id="command-list">
                <!-- 动态加载中，请稍候... -->
            </div>
        </div>
    </div>

    <!-- 拟物化终端控制台 (SSE Terminal Console) -->
    <div class="terminal-container minimized" id="terminal-window">
        <div class="terminal-header" id="terminal-header">
            <div class="terminal-dots">
                <span class="dot red" id="term-close"></span>
                <span class="dot yellow"></span>
                <span class="dot green"></span>
            </div>
            <span class="terminal-title">Agent 任务控制台</span>
            <button class="terminal-toggle" id="term-toggle">展开</button>
        </div>
        <div class="terminal-body" id="terminal-body">
            <div class="terminal-line system">[*] 控制台就绪。等待下发任务...</div>
        </div>
    </div>

    <!-- 聊天抽屉 (Chat Drawer) -->
    <div id="chat-fab" class="chat-fab" title="开启智能助理">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
    </div>

    <div id="chat-drawer" class="chat-drawer">
        <div class="drawer-header">
            <div class="drawer-title">
                <span class="status-dot"></span>
                <span>智能助理</span>
            </div>
            <button id="close-drawer-btn" class="icon-btn" title="关闭">&times;</button>
        </div>
        <div id="chat-history" class="chat-history">
            <div class="chat-message agent">
                <div class="bubble">你好！我是你的智能中枢助理。请问有什么可以帮你的？<br>(支持 ops_workspace 计算、web_clip 联网检索等)</div>
            </div>
        </div>
        <div class="chat-input-area">
            <textarea id="chat-input" placeholder="输入消息... (Shift+Enter 换行)"></textarea>
            <button id="chat-send-btn" class="send-btn" title="发送">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </div>

    <script src="main.js?v=6"></script>
    <script>
    // 动态加载指令列表（从后端注册表）
    (async function loadCommands() {
        const list = document.getElementById('command-list');
        const defaults = [
            {name:'/new', description:'重置当前会话记忆，开启全新对话上下文'},
            {name:'/mail_list g 1', description:'主动从 Gmail 邮箱拉取最新一封邮件'},
            {name:'查看上一个月的外币交易明细', description:'自然语言查询：AI 智能提炼上月外币账单明细'},
        ];

        try {
            const resp = await fetch('/agent/api/v1/dashboard');
            if (resp.ok) {
                const items = await resp.json();
                list.innerHTML = '';
                for (const item of items) {
                    const div = document.createElement('div');
                    div.className = 'command-item';
                    div.setAttribute('data-cmd', item.name);
                    div.innerHTML = `<span class="cmd-trigger">${item.name}</span><span class="cmd-desc">${item.description}</span>`;
                    div.addEventListener('click', () => {
                        document.getElementById('command-input').value = item.name;
                        document.getElementById('command-input').dispatchEvent(new Event('input'));
                    });
                    list.appendChild(div);
                }
            }
        } catch(e) {
            // API 不可用时回退到静态列表
            list.innerHTML = defaults.map(d =>
                `<div class="command-item" data-cmd="${d.name}">
                    <span class="cmd-trigger">${d.name}</span>
                    <span class="cmd-desc">${d.description}</span>
                </div>`
            ).join('');
        }

        // 追加始终可见的快捷项
        for (const d of defaults) {
            if (!list.querySelector(`[data-cmd="${d.name}"]`)) {
                const div = document.createElement('div');
                div.className = 'command-item';
                div.setAttribute('data-cmd', d.name);
                div.innerHTML = `<span class="cmd-trigger">${d.name}</span><span class="cmd-desc">${d.description}</span>`;
                div.addEventListener('click', () => {
                    document.getElementById('command-input').value = d.name;
                    document.getElementById('command-input').dispatchEvent(new Event('input'));
                });
                list.appendChild(div);
            }
        }
    })();
    </script>
</body>
</html>
